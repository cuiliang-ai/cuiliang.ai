<svg xmlns="http://www.w3.org/2000/svg" width="1320" height="1400" viewBox="0 0 1320 1400" role="img" aria-label="端到端调用链路时序图">
  <style>
    .bg{fill:#fbfaf7}
    .lane{stroke:#1f2328;stroke-width:1.5;fill:#ffffff;rx:10;ry:10}
    .lane-client{fill:#fef3c7}
    .lane-anth{fill:#eef6ff}
    .lane-ext{fill:#fce7f3}
    .lane-title{font:700 15px 'Segoe UI','Microsoft YaHei',sans-serif;fill:#111827}
    .lane-sub{font:12px 'Segoe UI','Microsoft YaHei',sans-serif;fill:#4b5563}
    .actor{stroke:#1f2328;stroke-width:1.5;rx:8;ry:8;fill:#ffffff}
    .actor-text{font:700 13px 'Segoe UI','Microsoft YaHei',sans-serif;fill:#111827}
    .lifeline{stroke:#9ca3af;stroke-width:1;stroke-dasharray:3 4}
    .actbar{fill:#dbeafe;stroke:#2563eb;stroke-width:1}
    .actbar-client{fill:#fde68a;stroke:#b45309;stroke-width:1}
    .actbar-ext{fill:#fbcfe8;stroke:#be185d;stroke-width:1}
    .msg{stroke:#1f2937;stroke-width:1.6;fill:none;marker-end:url(#tri)}
    .msg-ret{stroke:#1f2937;stroke-width:1.6;fill:none;stroke-dasharray:6 4;marker-end:url(#tri)}
    .mtxt{font:13px 'Segoe UI','Microsoft YaHei',sans-serif;fill:#111827}
    .mnote{font:11.5px 'Segoe UI','Microsoft YaHei',sans-serif;fill:#6b7280}
    .step{font:700 13px 'Segoe UI','Microsoft YaHei',sans-serif;fill:#ffffff}
    .phasebox{stroke:#2563eb;stroke-width:1.3;stroke-dasharray:6 4;fill:none;rx:8;ry:8}
    .phasetag{font:700 12px 'Segoe UI','Microsoft YaHei',sans-serif;fill:#2563eb}
    .phasetag-bg{fill:#eef6ff;stroke:#2563eb;stroke-width:1}
    .loopbox{stroke:#b45309;stroke-width:1.3;stroke-dasharray:6 4;fill:none;rx:8;ry:8}
    .looptag{font:700 12px 'Segoe UI','Microsoft YaHei',sans-serif;fill:#b45309}
    .looptag-bg{fill:#fff7ed;stroke:#b45309;stroke-width:1}
  </style>
  <defs>
    <marker id="tri" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#1f2937"/>
    </marker>
  </defs>
  <rect class="bg" width="1320" height="1400"/>

  <!-- ====== Lane headers ====== -->
  <rect class="lane lane-client" x="20" y="20" width="160" height="60"/>
  <text class="lane-title" x="100" y="46" text-anchor="middle">Client</text>
  <text class="lane-sub" x="100" y="66" text-anchor="middle">App / SDK</text>

  <rect class="lane lane-anth" x="200" y="20" width="900" height="60"/>
  <text class="lane-title" x="650" y="46" text-anchor="middle">Anthropic Managed Agents Platform</text>
  <text class="lane-sub" x="650" y="66" text-anchor="middle">Harness · Session Log · Vault · Model · Sandbox</text>

  <rect class="lane lane-ext" x="1120" y="20" width="180" height="60"/>
  <text class="lane-title" x="1210" y="46" text-anchor="middle">External</text>
  <text class="lane-sub" x="1210" y="66" text-anchor="middle">MCP / GitHub / …</text>

  <!-- ====== Actors ====== -->
  <!-- Client:100  Harness:280  Session:460  Vault:620  Model:780  Sandbox:960  MCP:1210 -->
  <rect class="actor" x="40" y="100" width="120" height="44"/>
  <text class="actor-text" x="100" y="128" text-anchor="middle">Client</text>

  <rect class="actor" x="220" y="100" width="120" height="44"/>
  <text class="actor-text" x="280" y="128" text-anchor="middle">Harness (Brain)</text>

  <rect class="actor" x="400" y="100" width="120" height="44"/>
  <text class="actor-text" x="460" y="128" text-anchor="middle">Session Log</text>

  <rect class="actor" x="560" y="100" width="120" height="44"/>
  <text class="actor-text" x="620" y="128" text-anchor="middle">Vault</text>

  <rect class="actor" x="720" y="100" width="120" height="44"/>
  <text class="actor-text" x="780" y="128" text-anchor="middle">Model</text>

  <rect class="actor" x="900" y="100" width="120" height="44"/>
  <text class="actor-text" x="960" y="128" text-anchor="middle">Sandbox (Hand)</text>

  <rect class="actor" x="1150" y="100" width="120" height="44"/>
  <text class="actor-text" x="1210" y="128" text-anchor="middle">MCP Proxy</text>

  <!-- ====== Lifelines ====== -->
  <line class="lifeline" x1="100"  y1="144" x2="100"  y2="1370"/>
  <line class="lifeline" x1="280"  y1="144" x2="280"  y2="1370"/>
  <line class="lifeline" x1="460"  y1="144" x2="460"  y2="1370"/>
  <line class="lifeline" x1="620"  y1="144" x2="620"  y2="1370"/>
  <line class="lifeline" x1="780"  y1="144" x2="780"  y2="1370"/>
  <line class="lifeline" x1="960"  y1="144" x2="960"  y2="1370"/>
  <line class="lifeline" x1="1210" y1="144" x2="1210" y2="1370"/>

  <!-- ====== Activation bars ====== -->
  <!-- Harness mostly active -->
  <rect class="actbar" x="274" y="160" width="12" height="1180"/>
  <!-- Sandbox active from step 4 (lazy provision) onward -->
  <rect class="actbar" x="954" y="430" width="12" height="720"/>

  <!-- ====== Phase 1: session creation (no container) ====== -->
  <rect class="phasebox" x="35" y="160" width="1265" height="100"/>
  <rect class="phasetag-bg" x="55" y="152" width="280" height="20"/>
  <text class="phasetag" x="70" y="167">① 会话创建 (此时不启动 sandbox)</text>

  <path class="msg" d="M106 200 L274 200"/>
  <text class="mtxt" x="190" y="194" text-anchor="middle">POST /v1/sessions (agent_id + env + vault_ids + resources)</text>
  <path class="msg" d="M286 225 L454 225"/>
  <text class="mtxt" x="370" y="219" text-anchor="middle">create session log</text>
  <path class="msg-ret" d="M274 248 L106 248"/>
  <text class="mtxt" x="190" y="242" text-anchor="middle">session_id + SSE stream</text>
  <circle cx="22" cy="220" r="13" fill="#2563eb"/>
  <text class="step" x="22" y="224" text-anchor="middle">1</text>

  <!-- ====== Phase 2: user message ====== -->
  <rect class="phasebox" x="35" y="280" width="1265" height="60"/>
  <rect class="phasetag-bg" x="55" y="272" width="170" height="20"/>
  <text class="phasetag" x="70" y="287">② 用户请求</text>

  <path class="msg" d="M106 310 L274 310"/>
  <text class="mtxt" x="190" y="304" text-anchor="middle">user.message  "分析 PR #1234 的潜在问题"</text>
  <path class="msg" d="M286 332 L454 332"/>
  <text class="mtxt" x="370" y="326" text-anchor="middle">emitEvent</text>
  <circle cx="22" cy="320" r="13" fill="#2563eb"/>
  <text class="step" x="22" y="324" text-anchor="middle">2</text>

  <!-- ====== Phase 3: 决策循环第1轮 ====== -->
  <rect class="phasebox" x="35" y="360" width="1265" height="60"/>
  <rect class="phasetag-bg" x="55" y="352" width="280" height="20"/>
  <text class="phasetag" x="70" y="367">③ 决策循环 - 第 1 轮</text>

  <path class="msg" d="M286 390 L774 390"/>
  <text class="mtxt" x="530" y="384" text-anchor="middle">Messages API (system + history + tools + skills_meta)</text>
  <path class="msg-ret" d="M774 412 L286 412"/>
  <text class="mtxt" x="530" y="406" text-anchor="middle">tool_use: read(.github/PULL_REQUEST.md)</text>
  <circle cx="22" cy="400" r="13" fill="#2563eb"/>
  <text class="step" x="22" y="404" text-anchor="middle">3</text>

  <!-- ====== Phase 4: Lazy provision ====== -->
  <rect class="phasebox" x="35" y="440" width="1265" height="100"/>
  <rect class="phasetag-bg" x="55" y="432" width="380" height="20"/>
  <text class="phasetag" x="70" y="447">④ Lazy provision container (首次需要 sandbox)</text>

  <path class="msg" d="M286 480 L954 480"/>
  <text class="mtxt" x="620" y="474" text-anchor="middle">provision({repo, files, memory_mounts})</text>
  <text class="mnote" x="620" y="494" text-anchor="middle">git clone 时 token 写入 remote; agent 永远拿不到 token</text>
  <path class="msg" d="M286 520 L954 520"/>
  <text class="mtxt" x="620" y="514" text-anchor="middle">tool request: read({path: ".github/..."})</text>
  <path class="msg-ret" d="M954 540 L286 540"/>
  <circle cx="22" cy="490" r="13" fill="#2563eb"/>
  <text class="step" x="22" y="494" text-anchor="middle">4</text>

  <!-- ====== Phase 5: 决策循环第2轮 (Skill 触发) ====== -->
  <rect class="phasebox" x="35" y="560" width="1265" height="100"/>
  <rect class="phasetag-bg" x="55" y="552" width="360" height="20"/>
  <text class="phasetag" x="70" y="567">⑤ 决策循环 - 第 2 轮 (Skill 触发)</text>

  <path class="msg-ret" d="M774 595 L286 595"/>
  <text class="mtxt" x="530" y="589" text-anchor="middle">tool_use: read(/workspace/skills/pr-review/SKILL.md)</text>
  <path class="msg" d="M286 620 L954 620"/>
  <text class="mtxt" x="620" y="614" text-anchor="middle">read skill content → 进入 context</text>
  <path class="msg-ret" d="M774 645 L286 645"/>
  <text class="mtxt" x="530" y="639" text-anchor="middle">tool_use: bash(git diff main..feature)</text>
  <circle cx="22" cy="600" r="13" fill="#2563eb"/>
  <text class="step" x="22" y="604" text-anchor="middle">5</text>

  <!-- ====== Phase 6: Permission Policy ====== -->
  <rect class="phasebox" x="35" y="680" width="1265" height="100"/>
  <rect class="phasetag-bg" x="55" y="672" width="280" height="20"/>
  <text class="phasetag" x="70" y="687">⑥ Permission Policy 触发</text>

  <path class="msg-ret" d="M274 715 L106 715"/>
  <text class="mtxt" x="190" y="709" text-anchor="middle">session.status_idle</text>
  <text class="mnote" x="190" y="725" text-anchor="middle">stop_reason: requires_action</text>
  <path class="msg" d="M106 755 L274 755"/>
  <text class="mtxt" x="190" y="749" text-anchor="middle">user.tool_confirmation (allow)</text>
  <path class="msg" d="M286 772 L954 772"/>
  <text class="mtxt" x="620" y="766" text-anchor="middle">tool request: bash({cmd: "git diff"}) → diff (~200K tokens)</text>
  <circle cx="22" cy="725" r="13" fill="#2563eb"/>
  <text class="step" x="22" y="729" text-anchor="middle">6</text>

  <!-- ====== Phase 7: 大输出 harness 落盘 ====== -->
  <rect class="phasebox" x="35" y="800" width="1265" height="100"/>
  <rect class="phasetag-bg" x="55" y="792" width="280" height="20"/>
  <text class="phasetag" x="70" y="807">⑦ 大输出 harness 自动落盘</text>

  <text class="mnote" x="280" y="828" text-anchor="middle">tool output &gt; 100K tokens · harness 检测大小决定落盘</text>
  <path class="msg" d="M286 850 L954 850"/>
  <text class="mtxt" x="620" y="844" text-anchor="middle">写入 /tmp/diff.txt</text>
  <path class="msg" d="M286 880 L774 880"/>
  <text class="mtxt" x="530" y="874" text-anchor="middle">Messages API (tool_result: preview + file_path)</text>
  <circle cx="22" cy="845" r="13" fill="#2563eb"/>
  <text class="step" x="22" y="849" text-anchor="middle">7</text>

  <!-- ====== Phase 8: MCP 工具调用 ====== -->
  <rect class="phasebox" x="35" y="920" width="1265" height="140"/>
  <rect class="phasetag-bg" x="55" y="912" width="380" height="20"/>
  <text class="phasetag" x="70" y="927">⑧ MCP 工具调用 (凭据完全隔离)</text>

  <path class="msg-ret" d="M774 953 L286 953"/>
  <text class="mtxt" x="530" y="947" text-anchor="middle">tool_use: github_create_comment</text>
  <path class="msg" d="M286 978 L1204 978"/>
  <text class="mtxt" x="745" y="972" text-anchor="middle">harness 转发调用 + session_token</text>
  <path class="msg" d="M1204 1003 L626 1003"/>
  <text class="mtxt" x="915" y="997" text-anchor="middle">取 OAuth credential</text>
  <path class="msg-ret" d="M626 1028 L1204 1028"/>
  <path class="msg-ret" d="M1204 1050 L286 1050"/>
  <text class="mnote" x="745" y="1044" text-anchor="middle">Sandbox 和 agent 都不接触 credentials</text>
  <circle cx="22" cy="985" r="13" fill="#2563eb"/>
  <text class="step" x="22" y="989" text-anchor="middle">8</text>

  <!-- ====== Phase 9: Multi-step loop ====== -->
  <rect class="loopbox" x="35" y="1080" width="1265" height="100"/>
  <rect class="looptag-bg" x="55" y="1072" width="380" height="20"/>
  <text class="looptag" x="70" y="1087">⑨ Multi-step 分析 (loop: tool_use → tool_result → continue)</text>

  <path class="msg-ret" d="M774 1115 L286 1115"/>
  <text class="mtxt" x="530" y="1109" text-anchor="middle">tool_use (读不同文件 / 跑测试 / 查文档)</text>
  <path class="msg" d="M286 1140 L954 1140"/>
  <text class="mtxt" x="620" y="1134" text-anchor="middle">tool request</text>
  <path class="msg-ret" d="M954 1163 L286 1163"/>
  <text class="mnote" x="620" y="1157" text-anchor="middle">result → emitEvent → Messages API continue</text>
  <circle cx="22" cy="1135" r="13" fill="#b45309"/>
  <text class="step" x="22" y="1139" text-anchor="middle">9</text>

  <!-- ====== Phase 10: 收敛输出 ====== -->
  <rect class="phasebox" x="35" y="1200" width="1265" height="120"/>
  <rect class="phasetag-bg" x="55" y="1192" width="200" height="20"/>
  <text class="phasetag" x="70" y="1207">⑩ 收敛输出</text>

  <path class="msg-ret" d="M774 1235 L286 1235"/>
  <text class="mtxt" x="530" y="1229" text-anchor="middle">text: "PR 分析报告: ..."</text>
  <path class="msg" d="M286 1265 L454 1265"/>
  <text class="mtxt" x="370" y="1259" text-anchor="middle">emitEvent(agent.message)</text>
  <path class="msg-ret" d="M274 1290 L106 1290"/>
  <text class="mtxt" x="190" y="1284" text-anchor="middle">agent.message (SSE)</text>
  <path class="msg-ret" d="M274 1310 L106 1310"/>
  <text class="mtxt" x="190" y="1304" text-anchor="middle">session.status_idle</text>
  <circle cx="22" cy="1270" r="13" fill="#2563eb"/>
  <text class="step" x="22" y="1274" text-anchor="middle">10</text>
</svg>
