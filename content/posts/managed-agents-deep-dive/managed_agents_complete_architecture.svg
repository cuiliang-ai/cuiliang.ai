<svg xmlns="http://www.w3.org/2000/svg" width="1260" height="1440" viewBox="0 0 1260 1440" role="img" aria-label="Managed Agents complete architecture">
  <style>
    .bg{fill:#fbfaf7}.box{stroke:#1f2328;stroke-width:2;rx:14;ry:14}.title{font:700 22px 'Segoe UI','Microsoft YaHei',sans-serif;fill:#111827}.text{font:16px 'Segoe UI','Microsoft YaHei',sans-serif;fill:#374151}.small{font:15px 'Segoe UI','Microsoft YaHei',sans-serif;fill:#374151}.arrow{stroke:#5b6472;stroke-width:2;fill:none;marker-end:url(#arrow)}
  </style>
  <defs><marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L9,3 z" fill="#5b6472"/></marker></defs>
  <rect class="bg" width="1260" height="1440"/>
  <rect class="box" x="40" y="40" width="1180" height="128" fill="#fff7ed"/><text class="title" x="630" y="74" text-anchor="middle">Managed Agents Access Boundary（接入与可用性边界）</text><text class="text" x="630" y="112" text-anchor="middle">First-party Claude API / Console    Public Managed Agents docs + beta REST API reference</text><text class="text" x="630" y="140" text-anchor="middle">其他云渠道需逐项验证；Claude model 渠道不等同于 Managed Agents runtime 渠道</text>
  <path class="arrow" d="M630 176 L630 200"/>
  <rect class="box" x="40" y="210" width="1180" height="128" fill="#eef6ff"/><text class="title" x="630" y="244" text-anchor="middle">Cross-cutting Trust &amp; Identity（跨产品信任基础设施）</text><text class="text" x="630" y="288" text-anchor="middle">Workload Identity Fed.    Vault (per-user OAuth)    MCP Tunnels (Cloudflare)    Files API    AWS IAM SigV4</text><text class="text" x="630" y="316" text-anchor="middle">ZDR / inference_geo（数据驻留控制）</text>
  <path class="arrow" d="M630 346 L630 370"/>
  <rect class="box" x="40" y="380" width="1180" height="128" fill="#f4f7ee"/><text class="title" x="630" y="414" text-anchor="middle">Operations &amp; Observability（运营与可观测）</text><text class="text" x="630" y="458" text-anchor="middle">Console    Admin API    Usage / Cost / Limits    Audit / CloudTrail    Rate Limits</text><text class="text" x="630" y="486" text-anchor="middle">work.stats（self-hosted）</text>
  <path class="arrow" d="M630 516 L630 540"/>
  <rect class="box" x="40" y="550" width="1180" height="330" fill="#fffdf7"/><text class="title" x="630" y="584" text-anchor="middle">Managed Agents Platform（Agent 运行时层）</text>
  <rect class="box" x="80" y="610" width="520" height="120" fill="#f8fafc"/><text class="title" x="340" y="646" text-anchor="middle" font-size="18">Definition（定义层 / 版本化）</text><text class="small" x="110" y="676">Agent (versioned): model + system + tools</text><text class="small" x="110" y="700">mcp_servers[] + skills[] + tool permission config</text><text class="small" x="110" y="724">Environment (cloud | self_hosted), Skill, Vault, File, MCP Tunnel</text>
  <rect class="box" x="660" y="610" width="520" height="120" fill="#f8fafc"/><text class="title" x="920" y="646" text-anchor="middle" font-size="18">Instance（实例层）</text><text class="small" x="690" y="676">Session = Agent + Env + vault_ids[] + resources[]</text><text class="small" x="690" y="700">Resources: github_repository / file / memory_store</text><text class="small" x="690" y="724">Threads / resources / events, Multi-agent threads &lt;=25</text>
  <rect class="box" x="80" y="750" width="520" height="92" fill="#f8fafc"/><text class="title" x="340" y="784" text-anchor="middle" font-size="18">State &amp; Iteration（状态与迭代）</text><text class="small" x="110" y="814">Memory Store + Versions    Conceptual: Dream / Outcome</text><text class="small" x="110" y="836">统一 requires_action 协议    30 天 retention</text>
  <rect class="box" x="660" y="750" width="520" height="92" fill="#f8fafc"/><text class="title" x="920" y="784" text-anchor="middle" font-size="18">Events / 异步通信</text><text class="small" x="690" y="814">SSE Stream（实时事件）    Webhooks（异步通知）</text><text class="small" x="690" y="836">user.* / agent.* / session.*</text>
  <path class="arrow" d="M630 888 L630 912"/>
  <rect class="box" x="40" y="922" width="1180" height="132" fill="#f7f2ff"/><text class="title" x="630" y="956" text-anchor="middle">Core API Layer（模型之上的核心能力）</text><text class="text" x="630" y="1000" text-anchor="middle">Messages API    Tool Use (Custom / MCP)    Vision / PDF    Code Execution    Files</text><text class="text" x="630" y="1028" text-anchor="middle">Prompt Caching    Skills    Web Search / Fetch    Extended Thinking    Batch Processing</text>
  <path class="arrow" d="M630 1062 L630 1086"/>
  <rect class="box" x="40" y="1096" width="1180" height="128" fill="#eef7f4"/><text class="title" x="630" y="1130" text-anchor="middle">Foundation Models（基础模型 / 一切能力的根基）</text><text class="text" x="630" y="1174" text-anchor="middle">Claude Opus 4.5 / 4.6 / 4.7    Claude Sonnet 4.5 / 4.6    Claude Haiku 4.5</text><text class="text" x="630" y="1202" text-anchor="middle">speed: standard | fast      context: 200k / 1M</text>
  <path class="arrow" d="M630 1232 L630 1256"/>
  <rect class="box" x="40" y="1266" width="1180" height="128" fill="#fff0f0"/><text class="title" x="630" y="1300" text-anchor="middle">Managed Agents Applications（下游应用形态）</text><text class="text" x="630" y="1344" text-anchor="middle">Third-party agent apps    Custom enterprise agents    Embedded / OEM agents</text><text class="text" x="630" y="1372" text-anchor="middle">Human-in-the-loop tools    Long-running automations    Agentic SaaS workflows</text>
</svg>
