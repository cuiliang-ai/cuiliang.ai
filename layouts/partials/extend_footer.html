{{- /* Busuanzi counters - only on article single pages */ -}}
<script>
(function() {
  var postMeta = document.querySelector('.post-single .post-meta');
  if (!postMeta) return;
  // Page PV (views for this page)
  var pvSpan = document.createElement('span');
  pvSpan.id = 'busuanzi_container_page_pv';
  pvSpan.style.display = 'none';
  pvSpan.innerHTML = '&nbsp;·&nbsp;<span id="busuanzi_value_page_pv"></span> views';
  postMeta.appendChild(pvSpan);
  // Site UV (unique visitors across site)
  var uvSpan = document.createElement('span');
  uvSpan.id = 'busuanzi_container_site_uv';
  uvSpan.style.display = 'none';
  uvSpan.innerHTML = '&nbsp;·&nbsp;<span id="busuanzi_value_site_uv"></span> visitors';
  postMeta.appendChild(uvSpan);
})();
</script>
