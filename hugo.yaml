baseURL: "https://cuiliang.ai/"
title: "CuiLiang.ai"
theme: "PaperMod"
hasCJKLanguage: true
enableRobotsTXT: true
defaultContentLanguage: zh
defaultContentLanguageInSubdir: false

languages:
  zh:
    languageName: "中文"
    languageCode: "zh"
    weight: 1
    title: "崔亮 Cui Liang｜AI Agent 工程博客"
    params:
      homeInfoParams:
        Title: "崔亮 Cui Liang 的 AI Agent 工程笔记"
        Content: |
          这里主要记录我对 AI Agent 工程、Context Engineering、Agent Runtime、Multi-Agent Orchestration 和工程实践的长期思考。
  en:
    languageName: "English"
    languageCode: "en"
    weight: 2
    title: "English Articles by Cui Liang｜CuiLiang.ai"
    params:
      description: "Selected English articles by Cui Liang on AI Agent engineering, code agents, agent runtime, and software infrastructure. The main site is published primarily in Chinese."
      homeInfoParams:
        Title: "English Articles by Cui Liang"
        Content: |
          This section contains selected English articles by Cui Liang. The main CuiLiang.ai blog is primarily published in Chinese.

          [中文主站：崔亮 Cui Liang 的 AI Agent 工程博客](https://cuiliang.ai/)
    menu:
      main:
        - identifier: series
          name: Series
          url: https://cuiliang.ai/series/
          weight: 1
        - identifier: skills
          name: Skills
          url: https://cuiliang.ai/skills/
          weight: 2
        - identifier: books
          name: Books
          url: https://cuiliang.ai/books/
          weight: 3
        - identifier: notes
          name: Notes
          url: https://cuiliang.ai/notes/
          weight: 4
        - identifier: archives
          name: Archives
          url: https://cuiliang.ai/archives/
          weight: 5
        - identifier: about
          name: About
          url: https://cuiliang.ai/about/
          weight: 6

taxonomies:
  tag: tags
  category: categories
  series: series

pagination:
  pagerSize: 10
enableEmoji: true

outputs:
  home:
    - HTML
    - RSS
    - JSON

minify:
  disableXML: true
  minifyOutput: true

params:
  env: production
  title: "崔亮 Cui Liang｜AI Agent 工程博客"
  description: "崔亮（Cui Liang）的技术博客，记录 AI Agent 工程、Context Engineering、Multi-Agent Orchestration、Agent Runtime、Claude Code、Codex CLI 与工程实践。"
  keywords: [AI Agent, CUA, MCP, LLM, Computer Use Agent]
  images: ["/og-default.png"]
  author: "Cui Liang"
  mainSections: ["posts"]
  defaultTheme: auto
  ShowReadingTime: true
  ShowShareButtons: false
  ShowPostNavLinks: true
  ShowBreadCrumbs: false
  ShowCodeCopyButtons: true
  ShowWordCount: false
  ShowRssButtonInSectionTermList: false
  UseHugoToc: true
  comments: false

  homeInfoParams:
    Title: "👋 Welcome to Liang's Log"
    Content: |
      Hi, I'm Liang. 10+ years in distributed systems, now building AI Agent infrastructure full-time.
      I write about the engineering side of agents — how they're built, deployed, and kept running in production.

  socialIcons:
    - name: rss
      url: "/index.xml"

  fuseOpts:
    isCaseSensitive: false
    shouldSort: true
    location: 0
    distance: 1000
    threshold: 0.4
    minMatchCharLength: 0
    keys: ["title", "permalink", "summary", "content"]

  cover:
    linkFullImages: true
    responsiveImages: true

  umami:
    websiteId: "587d983c-1f19-4a35-9f2f-eae441e620ed"

menu:
  main:
    - identifier: series
      name: Series
      url: /series/
      weight: 1
    - identifier: skills
      name: Skills
      url: /skills/
      weight: 2
    - identifier: books
      name: Books
      url: /books/
      weight: 3
    - identifier: notes
      name: Notes
      url: /notes/
      weight: 4
    - identifier: archives
      name: Archives
      url: /archives/
      weight: 5
    - identifier: about
      name: About
      url: /about/
      weight: 6

markup:
  goldmark:
    renderer:
      unsafe: true
  highlight:
    anchorLineNos: true
    codeFences: true
    guessSyntax: true
    lineNos: true
    noClasses: false
    style: dracula
